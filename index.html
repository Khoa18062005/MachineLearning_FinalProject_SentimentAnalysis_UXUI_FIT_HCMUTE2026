<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Studio - Khoa Nguyen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-slate-200 flex min-h-screen font-sans">

    <aside class="sidebar w-72 border-r border-slate-700 p-6 flex flex-col">
        <div class="mb-10 px-2">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                KHOA AI STUDIO
            </h1>
            <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-[0.2em]">Machine Learning Lab</p>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="changeTab('view-data')" id="btn-view-data" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i class="fas fa-table"></i> Xem dữ liệu
            </button>
            <button onclick="changeTab('view-outliers')" id="btn-view-outliers" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-amber-400">
                <i class="fas fa-circle-exclamation"></i> Dữ liệu ngoại lai
            </button>
            <button onclick="changeTab('process-outliers')" id="btn-process-outliers" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-emerald-400">
                <i class="fas fa-vial-circle-check"></i> Xử lý ngoại lai
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="mb-8">
            <h2 id="page-title" class="text-3xl font-bold text-white tracking-tight">Tệp dữ liệu huấn luyện</h2>
            <p id="page-desc" class="text-slate-400 mt-2 text-lg">Đang xử lý yêu cầu...</p>
        </div>

        <div class="table-wrapper bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            <div id="loading" class="p-24 text-center hidden">
                <div class="loader mb-4 mx-auto"></div>
                <p class="text-blue-400 font-medium">Hệ thống đang tính toán...</p>
            </div>

            <div id="table-container" class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="table-header" class="bg-slate-700/50 text-blue-300"></thead>
                    <tbody id="table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
