<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT ML | Sentiment Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0f172a] text-slate-200 flex min-h-screen font-sans">

    <aside class="sidebar w-72 border-r border-slate-700 p-6 flex flex-col">
        <div class="mb-10 px-2">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Sentiment Analysis
            </h1>
            <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-[0.2em]">PROJECT MACHINE LEARNING</p>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="changeTab('view-data')" id="btn-view-data"
                class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-xl">
                <i class="fas fa-table"></i> Xem dữ liệu
            </button>

            <button onclick="changeTab('view-dataset')" id="btn-view-dataset"
                class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-amber-400">
                <i class="fas fa-layer-group"></i> Xem các tập dữ liệu
            </button>

            <button onclick="changeTab('view-clean-dataset')" id="btn-view-clean-dataset"
                class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-teal-400">
                <i class="fas fa-broom"></i> Dữ liệu để huấn luyện
            </button>
            <button onclick="changeTab('train-models')" id="btn-train-models"
                class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-purple-400">
                <i class="fas fa-brain"></i> Kết quả Huấn luyện
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="mb-8">
            <h2 id="page-title" class="text-3xl font-bold text-white tracking-tight">Tệp dữ liệu huấn luyện</h2>
            <p id="page-desc" class="text-slate-400 mt-2 text-lg">Đang xử lý yêu cầu...</p>
            <div id="dataset-controls" class="mt-5 hidden flex items-center space-x-3">
                <button onclick="loadSubDataset('train')" id="btn-sub-train"
                    class="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium transition-colors shadow-lg">Tập
                    Train</button>
                <button onclick="loadSubDataset('val')" id="btn-sub-val"
                    class="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors">Tập
                    Validation</button>
                <button onclick="loadSubDataset('test')" id="btn-sub-test"
                    class="px-5 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors">Tập
                    Test</button>

                <div id="dataset-counts"
                    class="ml-4 pl-4 border-l border-slate-600 text-sm font-medium text-emerald-400"></div>
            </div>
        </div>

        <div class="table-wrapper bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            <div id="loading" class="p-24 text-center hidden">
                <div class="loader mb-4 mx-auto"></div>
                <p class="text-blue-400 font-medium">Hệ thống đang tính toán...</p>
            </div>

            <div id="table-container" class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="table-header" class="bg-slate-700/50 text-blue-300"></thead>
                    <tbody id="table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>

            <div id="pagination-controls"
                class="flex justify-between items-center p-4 bg-slate-800/50 border-t border-slate-700 hidden">
            </div>
        </div>
    </main>

    <div id="prob-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div
            class="bg-[#1e293b] border border-slate-700 w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white">Chi tiết tính toán xác suất (Naive Bayes)</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white"><i
                        class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto space-y-8 text-slate-300">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
